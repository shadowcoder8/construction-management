<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Madan Construction Co.</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header {
            background-color: #343a40;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .footer {
            background-color: #343a40;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        #error-message {
            display: none;
            margin-top: 15px;
            animation: fadeIn 0.5s;
        }
        .form-control:focus {
            border-color: #495057;
            box-shadow: none;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }

        /* Animation styles */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <!-- Modern Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <h1>Madan Construction Co.</h1>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow border-0" style="border-radius: var(--radius-lg);">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 font-weight-bold" style="color: var(--text-main);">Admin Login</h2>
                        <form id="login-form">
                            <div class="mb-4">
                                <label for="username" class="form-label fw-bold" style="color: var(--text-muted);">Username</label>
                                <input type="text" id="username" class="form-control" style="border-radius: var(--radius-md); padding: 0.75rem 1rem;" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold" style="color: var(--text-muted);">Password</label>
                                <div class="position-relative">
                                    <input type="password" id="password" class="form-control" style="border-radius: var(--radius-md); padding: 0.75rem 1rem; padding-right: 2.5rem;" required>
                                    <button type="button" id="toggle-password" class="btn border-0 position-absolute end-0 top-50 translate-middle-y" aria-label="Show password" style="background: transparent; color: var(--text-muted); z-index: 10;">
                                        <i class="fas fa-eye" id="toggle-password-icon"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius: var(--radius-md); font-weight: 600;">Sign In</button>
                        </form>
                        <div id="error-message" class="text-danger text-center mt-3" style="display: none; font-weight: 500;">Invalid username or password!</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Developed by Rikesh Chhetri</p>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
